<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Policy Debate Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --usa: #3b82f6;
            --eu: #fbbf24;
            --china: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #34d399, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .controls {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            align-self: flex-end;
            font-size: 1rem;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        #download-btn:hover {
            border-color: var(--primary) !important;
            color: var(--text) !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4) !important;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .agent-dot {
            transition: transform 0.3s ease;
        }

        .message:hover .agent-dot {
            transform: scale(1.5);
        }

        .transcript {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            position: relative;
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.usa { border-left: 6px solid var(--usa); }
        .message.eu { border-left: 6px solid var(--eu); }
        .message.china { border-left: 6px solid var(--china); }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .agent-name {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .round-badge {
            background: var(--bg);
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .stance {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 0.25rem;
        }

        .stance.supportive { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .stance.opposed { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .stance.neutral { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }

        .loading {
            text-align: center;
            padding: 3rem;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(16, 185, 129, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status-text {
            color: var(--text-muted);
            font-weight: 500;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Climate Policy Debate</h1>
            <p class="subtitle">Multi-agent simulation of global environmental negotiations</p>
        </header>

        <div class="controls">
            <div class="input-group">
                <label for="topic">Debate Topic</label>
                <input type="text" id="topic" placeholder="e.g. Carbon Taxation, Renewable Energy Subsidies..." value="Implementation of a Global Carbon Tax">
            </div>
            <div class="input-group" style="flex: 0 0 150px;">
                <label for="rounds">Rounds</label>
                <select id="rounds">
                    <option value="1">1 Round</option>
                    <option value="2" selected>2 Rounds</option>
                    <option value="3">3 Rounds</option>
                    <option value="4">4 Rounds</option>
                    <option value="5">5 Rounds</option>
                </select>
            </div>
            <button id="start-btn">Start Simulation</button>
            <button id="download-btn" style="display: none; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-muted);">Download Transcript</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="status-text">Orchestrating agents and retrieving policy data...</p>
        </div>

        <div class="transcript" id="transcript">
            <!-- Messages will be injected here -->
        </div>
    </div>

    <footer>
        AI-Powered Debate Simulator &bull; Built with FastAPI & Ollama
    </footer>

    <script src="static/script.js"></script>
</body>
</html>
